<!--
========================================
QIDA ASSISTANT — GTM LOADER
========================================

Instrucciones de uso en GTM:
  1. Google Tag Manager -> Tags -> New Tag
  2. Tipo: Custom HTML
  3. Pegar TODO este bloque
  4. Trigger: All Pages (o el que necesites)
  5. Save & Publish

Para deployar una version nueva del widget:
  1. Subir qida-widget.vN.js a Vercel Blob desde el dashboard.
     (Storage -> google-tag-manger -> Browser -> Upload)
  2. Actualizar WIDGET_URL abajo con la URL nueva.
  3. Actualizar WIDGET_URL en tempermonkey.js (deben quedar sincronizados).
  4. Pegar este archivo de nuevo en el Custom HTML tag de GTM y republicar el container.

Versionar por filename (v1 -> v2) evita problemas de cache del CDN
(Vercel Blob cachea publico por ~1 mes por default).
-->

<script>
(function () {
  // ============ CONFIG ============
  var WIDGET_URL = 'https://6lrdpudff30zg6ys.public.blob.vercel-storage.com/qida-widget.v1.js';

  // Config que se pasa al widget en init()
  var WIDGET_CONFIG = {
    launcherLabel: 'Asistente'
    // logoUrl: 'https://.../qida-logo.png'   // opcional: pisa el avatar "Q" inline
  };
  // ============ /CONFIG ===========

  if (window.__QIDA_LOADER__) return;
  window.__QIDA_LOADER__ = true;

  var script = document.createElement('script');
  script.type = 'text/javascript';
  script.async = true;
  script.src = WIDGET_URL;
  script.crossOrigin = 'anonymous';

  script.onload = function () {
    if (window.QidaAssistant && typeof window.QidaAssistant.init === 'function') {
      try {
        window.QidaAssistant.init(WIDGET_CONFIG);
      } catch (e) {
        console.error('[QidaAssistant] init() threw:', e);
      }
    } else {
      console.error('[QidaAssistant] Script loaded but window.QidaAssistant is missing.');
    }
  };

  script.onerror = function () {
    console.error('[QidaAssistant] Failed to load widget from ' + WIDGET_URL);
  };

  var firstScript = document.getElementsByTagName('script')[0];
  if (firstScript && firstScript.parentNode) {
    firstScript.parentNode.insertBefore(script, firstScript);
  } else {
    (document.head || document.documentElement).appendChild(script);
  }
})();
</script>
